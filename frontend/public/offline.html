<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — SMO Scheduler</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f3f4f6; }
    .box { text-align: center; padding: 40px; background: white;
           border-radius: 16px; max-width: 360px; }
    h1 { color: #7b1e3a; font-size: 20px; margin: 0 0 8px; }
    p  { color: #6b7280; font-size: 14px; margin: 0 0 20px; }
    button { background: #7b1e3a; color: white; border: none; padding: 12px 24px;
             border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:48px;margin-bottom:16px">📵</div>
    <h1>You're offline</h1>
    <p>SMO Scheduler needs an internet connection. Please reconnect and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
